name: Deploy Nexus frontend to Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'config/**'
      - '.github/workflows/deploy-nexus-frontend.yml'
  workflow_dispatch:

concurrency:
  group: nexus-frontend
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Build SPA (VITE_API_BASE_URL baked in)
        working-directory: web
        env:
          # Falls back to web/.env.production if the secret is unset; explicit here so
          # CI logs make the deploy target obvious and you can override per environment.
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api-nexus.stellarinfomatica.com' }}
        run: npm run build

      - name: Sanity-check build artefact
        run: |
          test -f web/dist/index.html || (echo "::error::web/dist/index.html missing" && exit 1)
          test -f web/dist/.htaccess  || (echo "::error::web/dist/.htaccess missing (SPA fallback)" && exit 1)
          ls -la web/dist | head -n 30

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          server-dir: ${{ secrets.HOSTINGER_FTP_PATH }}
          local-dir: web/dist/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
