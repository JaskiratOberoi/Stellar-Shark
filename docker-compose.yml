services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus
    ports:
      # Host can use DATABASE_URL=...@localhost:5433 for local npm run dev
      - "${NEXUS_DB_PORT:-5433}:5432"
    volumes:
      - nexus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      # Host port defaults to 3101; container listens on 3001 unless PORT is overridden
      - "${NEXUS_APP_PORT:-3101}:3001"
    volumes:
      # BU labels + LIS badges for the scraper (must match web + Teller UI); keeps local dev in sync without rebuild
      - ./config:/app/config:ro
    environment:
      PORT: "3001"
      NEXUS_BIND: "0.0.0.0"
      DATABASE_URL: postgresql://nexus:nexus@db:5432/nexus
      JWT_SECRET: ${JWT_SECRET:-nexus-dev-jwt-change-me}
      TZ: ${TZ:-Asia/Kolkata}
      # Hard stop for hung LIS runs (ms). Default 90 minutes.
      GENOMICS_RUN_MAX_MS: ${GENOMICS_RUN_MAX_MS:-5400000}
    mem_limit: 2g
    cpus: 2.0
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3001/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    depends_on:
      db:
        condition: service_healthy

volumes:
  nexus_pgdata:
