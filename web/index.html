<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus by Stellar Infomatica</title>
    <meta name="description" content="Nexus by Stellar Infomatica -- Genomics LIS daily test-volume dashboard." />
    <meta name="theme-color" content="#FAFAF7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0A0A0A" media="(prefers-color-scheme: dark)" />

    <meta property="og:title" content="Nexus by Stellar Infomatica" />
    <meta property="og:description" content="Genomics LIS daily test-volume dashboard." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Nexus by Stellar Infomatica" />

    <link rel="icon" type="image/svg+xml" href="/nexus-mark.svg" />
    <link rel="icon" type="image/png" href="/icon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <script>
      // Apply theme before paint to avoid flash.
      (function () {
        try {
          var stored = localStorage.getItem('nexus_theme');
          var mode = stored || 'system';
          var resolved =
            mode === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : mode;
          document.documentElement.setAttribute('data-theme', resolved);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
